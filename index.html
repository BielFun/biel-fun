<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Biel.Fun - Jogos do Biel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0f;color:#fff;font-family:Arial,sans-serif;touch-action:manipulation}
.tela{display:none;min-height:100vh;padding:15px}
.tela.ativa{display:block}
.menu{text-align:center;padding:30px 15px}
.menu h1{font-size:38px;font-weight:900;margin-bottom:8px;color:#00d9ff;text-shadow:0 0 15px #00d9ff}
.menu p{color:#888;margin-bottom:35px}
.grid{display:grid;gap:15px;max-width:400px;margin:0 auto}
.card{background:#151520;border:2px solid #222;border-radius:16px;padding:25px;cursor:pointer}
.card:active{transform:scale(0.97);border-color:#00d9ff}
.card h2{font-size:22px;margin-bottom:6px}
.card p{color:#666;font-size:13px}
.voltar{position:fixed;top:12px;left:12px;background:#222;border:2px solid #444;color:#fff;padding:8px 16px;border-radius:20px;font-weight:700;cursor:pointer;z-index:100}
.voltar:active{background:#333}
.clicker{text-align:center;padding-top:50px}
.clicker h1{font-size:32px;margin:15px 0;color:#ffd700}
.moeda{width:180px;height:180px;background:linear-gradient(135deg,#ffd700,#ff8800);border-radius:50%;margin:25px auto;display:flex;align-items:center;justify-content:center;font-size:65px;cursor:pointer;user-select:none;border:5px solid #ff6600;box-shadow:0 8px 25px rgba(255,136,0,.4)}
.moeda:active{transform:scale(0.93)}
.btn{background:#00d9ff;color:#000;border:none;padding:14px 28px;border-radius:25px;font-weight:800;font-size:15px;margin:12px;cursor:pointer}
.info{color:#999;margin:12px 0;font-size:14px}
.adivinha{text-align:center;padding-top:50px}
.adivinha h1{font-size:28px;margin:15px 0;color:#00ff88}
.adivinha input{padding:16px;font-size:20px;border:3px solid #333;border-radius:12px;background:#111;color:#fff;width:200px;text-align:center;margin:15px}
#dica{font-size:24px;margin:20px 0;min-height:32px;font-weight:700;color:#00ff88}
.snake{text-align:center;padding-top:50px}
canvas{background:#0f0f15;display:block;margin:12px auto;border:3px solid #222;border-radius:8px}
.info-snake{padding:12px;font-size:17px;font-weight:700}
.controles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:300px;margin:18px auto;padding:0 15px}
.btn-seta{background:#151520;color:#fff;border:3px solid #333;border-radius:12px;padding:20px;font-size:26px;cursor:pointer;user-select:none}
.btn-seta:active{background:#333;transform:scale(0.94)}
.vazio{visibility:hidden}
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="tela ativa">
<div class="menu">
<h1>Biel.Fun</h1>
<p>Jogos feitos 100% pelo Biel</p>
<div class="grid">
<div class="card" onclick="abrir('clicker')">
<h2>👑 Biel Clicker</h2>
<p>Clica e ganha BielCoins</p>
</div>
<div class="card" onclick="abrir('adivinha')">
<h2>🎯 Adivinha Biel</h2>
<p>Adivinha o número secreto</p>
</div>
<div class="card" onclick="abrir('snake')">
<h2>🐍 Biel Snake</h2>
<p>Cobrinha mobile</p>
</div>
</div>
</div>
</div>

<!-- CLICKER -->
<div id="clicker" class="tela">
<button class="voltar" onclick="voltar()">← Menu</button>
<div class="clicker">
<h1 id="coins">0 BielCoins</h1>
<div class="moeda" onclick="clicar()">👑</div>
<p class="info" id="porClique">1 por clique</p>
<button class="btn" onclick="upgrade()">Upgrade - <span id="custo">50</span></button>
</div>
</div>

<!-- ADIVINHA -->
<div id="adivinha" class="tela">
<button class="voltar" onclick="voltar()">← Menu</button>
<div class="adivinha">
<h1>Adivinha Biel</h1>
<p class="info">Número de 1 a 100</p>
<input type="number" id="chute" placeholder="Teu chute" min="1" max="100">
<br>
<button class="btn" onclick="tentar()">Tentar</button>
<p id="dica"></p>
<p class="info">Tentativas: <span id="tent">0</span> | Recorde: <span id="rec">-</span></p>
</div>
</div>

<!-- SNAKE -->
<div id="snake" class="tela">
<button class="voltar" onclick="voltar()">← Menu</button>
<div class="snake">
<div class="info-snake">Pontos: <span id="ptsSnake">0</span> | Recorde: <span id="recSnake">0</span></div>
<canvas id="jogo" width="300" height="300"></canvas>
<div class="controles">
<div class="vazio"></div>
<div class="btn-seta" ontouchstart="dir(0,-1)" onclick="dir(0,-1)">⬆️</div>
<div class="vazio"></div>
<div class="btn-seta" ontouchstart="dir(-1,0)" onclick="dir(-1,0)">⬅️</div>
<div class="btn-seta" ontouchstart="pausa()" onclick="pausa()">⏸️</div>
<div class="btn-seta" ontouchstart="dir(1,0)" onclick="dir(1,0)">➡️</div>
<div class="vazio"></div>
<div class="btn-seta" ontouchstart="dir(0,1)" onclick="dir(0,1)">⬇️</div>
<div class="vazio"></div>
</div>
</div>
</div>

<script>
// NAVEGAÇÃO
function abrir(j){document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));document.getElementById(j).classList.add('ativa');if(j=='snake'&&!iniciou){iniciou=true;pausado=false;loop()}}
function voltar(){document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));document.getElementById('menu').classList.add('ativa');pausado=true}

// CLICKER
let coins=+localStorage.getItem('bielCoins')||0,pc=+localStorage.getItem('bielPC')||1,custo=+localStorage.getItem('bielCusto')||50;
function upClicker(){
document.getElementById('coins').innerText=coins+' BielCoins';
document.getElementById('porClique').innerText=pc+' por clique';
document.getElementById('custo').innerText=custo;
localStorage.setItem('bielCoins',coins);localStorage.setItem('bielPC',pc);localStorage.setItem('bielCusto',custo)}
function clicar(){coins+=pc;upClicker()}
function upgrade(){if(coins>=custo){coins-=custo;pc++;custo=Math.floor(custo*1.8);upClicker()}}
upClicker();

// ADIVINHA
let num=Math.floor(Math.random()*100)+1,tent=0,rec=+localStorage.getItem('bielRec')||0;
document.getElementById('rec').innerText=rec||'-';
function tentar(){
let c=+document.getElementById('chute').value;
if(!c||c<1||c>100)return;
tent++;document.getElementById('tent').innerText=tent;
if(c==num){
document.getElementById('dica').innerText='ACERTOU EM '+tent+'!';
if(!rec||tent<rec){rec=tent;localStorage.setItem('bielRec',rec);document.getElementById('rec').innerText=rec}
setTimeout(()=>{num=Math.floor(Math.random()*100)+1;tent=0;document.getElementById('tent').innerText=0;document.getElementById('dica').innerText='Novo número!';document.getElementById('chute').value=''},2000)
}else if(c<num){document.getElementById('dica').innerText='MAIOR 📈'}
else{document.getElementById('dica').innerText='MENOR 📉'}
document.getElementById('chute').value=''}
document.getElementById('chute').addEventListener('keypress',e=>{if(e.key==='Enter')tentar()});

// SNAKE
const cv=document.getElementById('jogo'),ctx=cv.getContext('2d'),g=15,s=cv.width/g;
let cobra=[{x:7,y:7}],d={x:1,y:0},comida=novaComida(),pts=0,recS=+localStorage.getItem('snakeRec')||0,pausado=true,vel=110,iniciou=false;
document.getElementById('recSnake').innerText=recS;
function novaComida(){let f;do{f={x:Math.floor(Math.random()*g),y:Math.floor(Math.random()*g)}}while(cobra.some(c=>c.x==f.x&&c.y==f.y));return f}
function dir(x,y){if(pausado)return;if(d.x==-x&&d.y==-y)return;d={x,y}}
function pausa(){pausado=!pausado}
function loop(){
if(pausado){setTimeout(loop,vel);return}
let h={x:cobra[0].x+d.x,y:cobra[0].y+d.y};
if(h.x<0||h.x>=g||h.y<0||h.y>=g||cobra.some(c=>c.x==h.x&&c.y==h.y)){
if(pts>recS){recS=pts;localStorage.setItem('snakeRec',recS);document.getElementById('recSnake').innerText=recS}
cobra=[{x:7,y:7}];d={x:1,y:0};pts=0;comida=novaComida();vel=110;
}else{
cobra.unshift(h);
if(h.x==comida.x&&h.y==comida.y){pts+=10;comida=novaComida();if(vel>60)vel-=2}else{cobra.pop()}
}
ctx.fillStyle='#0f0f15';ctx.fillRect(0,0,cv.width,cv.height);
ctx.fillStyle='#ff3333';ctx.fillRect(comida.x*s+3,comida.y*s+3,s-6,s-6);
cobra.forEach((c,i)=>{ctx.fillStyle=i==0?'#00ff00':'#00cc00';ctx.fillRect(c.x*s+1,c.y*s+1,s-2,s-2)});
document.getElementById('ptsSnake').innerText=pts;
setTimeout(loop,vel)}
document.addEventListener('keydown',e=>{
if(!document.getElementById('snake').classList.contains('ativa'))return;
if(e.key=='ArrowUp')dir(0,-1);if(e.key=='ArrowDown')dir(0,1);
if(e.key=='ArrowLeft')dir(-1,0);if(e.key=='ArrowRight')dir(1,0);
if(e.key==' ')pausa()});
</script>
</body>
</html>
