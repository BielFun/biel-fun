*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.header{padding:30px 20px;text-align:center;background:#0a0a0a;position:sticky;top:0;z-index:100;border-bottom:1px solid #222}
.header h1{font-size:42px;font-weight:800;margin-bottom:8px}
.header p{color:#888;font-size:14px}
.stats{display:flex;gap:20px;justify-content:center;margin-top:15px}
.stat{background:#111;padding:8px 16px;border-radius:20px;font-size:13px}
.filtros{padding:15px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;background:#0a0a0a;position:sticky;top:131px;z-index:99;border-bottom:1px solid #222}
.filtros button{padding:8px 16px;background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:50px;cursor:pointer;font-weight:600;font-size:13px}
.filtros button.ativo{background:#fff;color:#000;border-color:#fff}
.filtros button:hover{border-color:#666}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;padding:20px}
.card{background:#0f0f0f;border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid #1a1a1a;transition:.15s}
.card:hover{border-color:#444;transform:translateY(-2px)}
.card img{width:100%;height:160px;object-fit:cover;background:#1a1a1a}
.card-body{padding:12px}
.card h3{font-size:16px;margin-bottom:4px;line-height:1.3}
.card p{font-size:12px;color:#666}
.badge{font-size:10px;background:#222;padding:2px 8px;border-radius:8px;display:inline-block;margin-bottom:6px;color:#aaa}
.game-view{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:9999;display:none}
.game-header{height:50px;background:#111;display:flex;align-items:center;justify-content:space-between;padding:0 15px;border-bottom:1px solid #222}
.game-header h3{font-size:16px}
.game-header button{background:#fff;color:#000;border:none;padding:6px 14px;border-radius:20px;cursor:pointer;font-weight:700;font-size:13px}
.game-iframe{width:100%;height:calc(100% - 50px);border:none}
.loading{text-align:center;padding:60px;color:#555;grid-column:1/-1}
.busca{padding:15px;background:#0a0a0a;border-bottom:1px solid #222;position:sticky;top:182px;z-index:98}
.busca input{width:100%;max-width:600px;margin:0 auto;display:block;padding:12px 20px;background:#1a1a1a;border:1px solid #333;border-radius:50px;color:#fff;font-size:15px}
.busca input:focus{outline:none;border-color:#555}
</style>

  {n:"Cookie Clicker Classic",c:"itch",u:"https://orteil.itch.io/cookie-clicker-classic/embed",i:"https://img.itch.zone/aW1nLzEyMzQ1Njc4LnBuZw==/315x250%23c/abc.png"},
];

let filtroAtual='todos';
let termoBusca='';

function render(){
  let lista = jogos.filter(j=>{
    let passaFiltro = filtroAtual==='todos' || j.c===filtroAtual;
    let passaBusca = j.n.toLowerCase().includes(termoBusca.toLowerCase());
    return passaFiltro && passaBusca;
  });
  document.getElementById('totalJogos').textContent=lista.length;
  document.getElementById('grid').innerHTML = lista.length ? lista.map(j=>`
    <div class="card" onclick="abrir('${j.u}','${j.n}')">
      <img src="${j.i}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22280%22 height=%22160%22%3E%3Crect fill=%22%23111%22 width=%22280%22 height=%22160%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 fill=%22%23444%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2214%22%3E${j.n}%3C/text%3E%3C/svg%3E'">
      <div class="card-body">
        <span class="badge">${j.c.toUpperCase()}</span>
        <h3>${j.n}</h3>
      </div>
    </div>
  `).join('') : '<div class="loading">Nenhum jogo encontrado</div>';
}

function filtrar(cat){
  filtroAtual=cat;
  document.querySelectorAll('.filtros button').forEach(b=>b.classList.remove('ativo'));
  event.target.classList.add('ativo');
  render();
}

function buscar(){
  termoBusca=document.getElementById('buscaInput').value;
  render();
}

function abrir(url,nome){
  document.getElementById('gameView').style.display='block';
  document.getElementById('gameTitle').textContent=nome;
  document.getElementById('gameFrame').src=url;
}

function fechar(){
  document.getElementById('gameView').style.display='none';
  document.getElementById('gameFrame').src='';
}

render();
</script>
</body>
</html>
