<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Biel.Fun - Jogos do Biel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;touch-action:manipulation}
.tela{display:none;min-height:100vh;padding:20px}
.tela.ativa{display:block}
.menu{text-align:center;padding:40px 20px}
.menu h1{font-size:42px;font-weight:800;margin-bottom:10px}
.menu p{color:#888;margin-bottom:40px}
.grid{display:grid;gap:20px;max-width:500px;margin:0 auto}
.card{background:#111;border:2px solid #222;border-radius:20px;padding:30px;cursor:pointer;transition:.2s}
.card:active{transform:scale(0.98);border-color:#fff}
.card h2{font-size:24px;margin-bottom:8px}
.card p{color:#666;font-size:14px}
.voltar{position:fixed;top:15px;left:15px;background:#222;border:2px solid #444;color:#fff;padding:10px 18px;border-radius:50px;font-weight:700;cursor:pointer;z-index:100}
.voltar:active{background:#333}

/* CLICKER */
.clicker{text-align:center;padding-top:60px}
.clicker h1{font-size:36px;margin:20px 0}
.moeda{width:200px;height:200px;background:linear-gradient(135deg,#ffd700,#ffaa00);border-radius:50%;margin:30px auto;display:flex;align-items:center;justify-content:center;font-size:70px;cursor:pointer;user-select:none;border:6px solid #ff8800;box-shadow:0 10px 30px rgba(255,170,0,.3)}
.moeda:active{transform:scale(0.92)}
.btn{background:#fff;color:#000;border:none;padding:16px 32px;border-radius:30px;font-weight:700;font-size:16px;margin:15px;cursor:pointer}
.info{color:#999;margin:15px 0;font-size:15px}

/* ADIVINHA */
.adivinha{text-align:center;padding-top:60px}
.adivinha h1{font-size:32px;margin:20px 0}
.adivinha input{padding:18px;font-size:22px;border:3px solid #333;border-radius:15px;background:#111;color:#fff;width:220px;text-align:center;margin:20px}
#dica{font-size:26px;margin:25px 0;min-height:35px;font-weight:700}

/* SNAKE */
.snake{text-align:center;padding-top:60px}
canvas{background:#0a0a0a;display:block;margin:15px auto;border:3px solid #222;border-radius:10px}
.info-snake{padding:15px;font-size:18px;font-weight:700}
.controles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:320px;margin:20px auto;padding:0 20px}
.btn-seta{background:#1a1a1a;color:#fff;border:3px solid #333;border-radius:15px;padding:22px;font-size:28px;cursor:pointer;user-select:none}
.btn-seta:active{background:#333;transform:scale(0.95)}
.vazio{visibility:hidden}
</style>
</head>
<body>

<!-- TELA MENU -->
<div id="menu" class="tela ativa">
<div class="menu">
<h1>Biel.Fun</h1>
<p>Jogos feitos pelo Biel</p>
<div class="grid">
<div class="card" onclick="abrirJogo('clicker')">
<h2>👑 Biel Clicker</h2>
<p>Clica e ganha BielCoins</p>
</div>
<div class="card" onclick="abrirJogo('adivinha')">
<h2>🎯 Adivinha Biel</h2>
<p>Adivinha o número de 1 a 100</p>
</div>
<div class="card" onclick="abrirJogo('snake')">
<h2>🐍 Biel Snake</h2>
<p>Cobrinha clássica mobile</p>
</div>
</div>
</div>
</div>

<!-- JOGO 1: CLICKER -->
<div id="clicker" class="tela">
<button class="voltar" onclick="voltar()">← Menu</button>
<div class="clicker">
<h1 id="pontosClicker">0 BielCoins</h1>
<div class="moeda" onclick="clicar()">👑</div>
<p class="info" id="porClique">1 por clique</p>
<button class="btn" onclick="upgrade()">Upgrade - <span id="custo">50</span> coins</button>
</div>
</div>

<!-- JOGO 2: ADIVINHA -->
<div id="adivinha" class="tela">
<button class="voltar" onclick="voltar()">← Menu</button>
<div class="adivinha">
<h1>Adivinha Biel</h1>
<p class="info">Número de 1 a 100</p>
<input type="number" id="chute" placeholder="Teu chute" min="1" max="100">
<br>
<button class="btn" onclick="tentar()">Tentar</button>
<p id="dica"></p>
<p class="info">Tentativas: <span id="tent">0</span> | Recorde: <span id="rec">-</span></p>
</div>
</div>

<!-- JOGO 3: SNAKE -->
<div id="snake" class="tela">
<button class="voltar" onclick="voltar()">← Menu</button>
<div class="snake">
<div class="info-snake">Pontos: <span id="pontosSnake">0</span> | Recorde: <span id="recSnake">0</span></div>
<canvas id="jogoSnake" width="300" height="300"></canvas>
<div class="controles">
<div class="vazio"></div>
<div class="btn-seta" ontouchstart="mudaDir(0,-1)" onclick="mudaDir(0,-1)">⬆️</div>
<div class="vazio"></div>
<div class="btn-seta" ontouchstart="mudaDir(-1,0)" onclick="mudaDir(-1,0)">⬅️</div>
<div class="btn-seta" ontouchstart="pausarSnake()" onclick="pausarSnake()">⏸️</div>
<div class="btn-seta" ontouchstart="mudaDir(1,0)" onclick="mudaDir(1,0)">➡️</div>
<div class="vazio"></div>
<div class="btn-seta" ontouchstart="mudaDir(0,1)" onclick="mudaDir(0,1)">⬇️</div>
<div class="vazio"></div>
</div>
</div>
</div>

<script>
// NAVEGAÇÃO
function abrirJogo(jogo){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.getElementById(jogo).classList.add('ativa');
  if(jogo=='snake')iniciarSnake();
}
function voltar(){
  document.querySelectorAll('.tela').forEach(t=>t.classList.remove('ativa'));
  document.getElementById('menu').classList.add('ativa');
  pausadoSnake=true;
}

// CLICKER
let pClick=parseInt(localStorage.getItem('bielCoins')||'0'),pc=parseInt(localStorage.getItem('bielPC')||'1'),custo=parseInt(localStorage.getItem('bielCusto')||'50');
function updateClicker(){
  document.getElementById('pontosClicker').innerText=pClick+' BielCoins';
  document.getElementById('porClique').innerText=pc+' por clique';
  document.getElementById('custo').innerText=custo;
  localStorage.setItem('bielCoins',pClick);localStorage.setItem('bielPC',pc);localStorage.setItem('bielCusto',custo);
}
function clicar(){pClick+=pc;updateClicker()}
function upgrade(){if(pClick>=custo){pClick-=custo;pc++;custo=Math.floor(custo*1.8);updateClicker()}}
updateClicker();

// ADIVINHA
let numAdivinha=Math.floor(Math.random()*100)+1,tentAdivinha=0,recAdivinha=parseInt(localStorage.getItem('bielRec')||'0');
document.getElementById('rec').innerText=recAdivinha||'-';
function tentar(){
  let c=Number(document.getElementById('chute').value);
  if(!c||c<1||c>100)return;
  tentAdivinha++;document.getElementById('tent').innerText=tentAdivinha;
  if(c==numAdivinha){
    document.getElementById('dica').innerText='ACERTOU EM '+tentAdivinha+'!';
    if(!recAdivinha||tentAdivinha<recAdivinha){recAdivinha=tentAdivinha;localStorage.setItem('bielRec',recAdivinha);document.getElementById('rec').innerText=recAdivinha}
    setTimeout(()=>{numAdivinha=Math.floor(Math.random()*100)+1;tentAdivinha=0;document.getElementById('tent').innerText=0;document.getElementById('dica').innerText='Novo número!';document.getElementById('chute').value=''},2000)
  }else if(c<numAdivinha){document.getElementById('dica').innerText='MAIOR 📈'}
  else{document.getElementById('dica').innerText='MENOR 📉'}
  document.getElementById('chute').value='';
}
document.getElementById('chute').addEventListener('keypress',e=>{if(e.key==='Enter')tentar()});

// SNAKE
const canvasSnake=document.getElementById('jogoSnake'),ctxSnake=canvasSnake.getContext('2d'),grid=15,size=canvasSnake.width/grid;
let snakeBody=[{x:7,y:7}],dirSnake={x:1,y:0},foodSnake=geraComidaSnake(),pontosSnake=0,recSnake=parseInt(localStorage.getItem('snakeRec')||'0'),pausadoSnake=true,veloSnake=120,jogoIniciado=false;
document.getElementById('recSnake').innerText=recSnake;
function geraComidaSnake(){let f;do{f={x:Math.floor(Math.random()*grid),y:Math.floor(Math.random()*grid)}}while(snakeBody.some(s=>s.x==f.x&&s.y==f.y));return f}
function mudaDir(x,y){if(pausadoSnake)return;if(dirSnake.x==-x&&dirSnake.y==-y)return;dirSnake={x,y}}
function pausarSnake(){pausadoSnake=!pausadoSnake}
function iniciarSnake(){if(!jogoIniciado){jogoIniciado=true;pausadoSnake=false;loopSnake()}}
function loopSnake(){
  if(pausadoSnake){setTimeout(loopSnake,veloSnake);return}
  let head={x:snakeBody[0].x+dirSnake.x,y:snakeBody[0].y+dirSnake.y};
  if(head.x<0||head.x>=grid||head.y<0||head.y>=grid||snakeBody.some(s=>s.x==head.x&&s.y==head.y)){
    if(pontosSnake>recSnake){recSnake=pontosSnake;localStorage.setItem('snakeRec',recSnake);document.getElementById('recSnake').innerText=recSnake}
    snakeBody=[{x:7,y:7}];dirSnake={x:1,y:0};pontosSnake=0;foodSnake=geraComidaSnake();veloSnake=120;
  }else{
    snakeBody.unshift(head);
    if(head.x==foodSnake.x&&head.y==foodSnake.y){pontosSnake+=10;foodSnake=geraComidaSnake();if(veloSnake>60)veloSnake-=2}else{snakeBody.pop()}
  }
  ctxSnake.fillStyle='#0a0a0a';ctxSnake.fillRect(0,0,canvasSnake.width,canvasSnake.height);
  ctxSnake.fillStyle='#ff3333';ctxSnake.fillRect(foodSnake.x*size+3,foodSnake.y*size+3,size-6,size-6);
  snakeBody.forEach((s,i)=>{ctxSnake.fillStyle=i==0?'#00ff00':'#00cc00';ctxSnake.fillRect(s.x*size+1,s.y*size+1,size-2,size-2)});
  document.getElementById('pontosSnake').innerText=pontosSnake;
  setTimeout(loopSnake,veloSnake);
}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('snake').classList.contains('ativa'))return;
  if(e.key=='ArrowUp')mudaDir(0,-1);if(e.key=='ArrowDown')mudaDir(0,1);
  if(e.key=='ArrowLeft')mudaDir(-1,0);if(e.key=='ArrowRight')mudaDir(1,0);
  if(e.key==' ')pausarSnake();
});
</script>
</body>
</html>
