<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Biel.Fun</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#000}
.hidden{display:none!important}
.header{padding:60px 20px 40px;text-align:center}
.header h1{font-size:72px;font-weight:800;margin:0 0 10px;letter-spacing:-3px}
.header p{font-size:20px;color:#666;margin:0}
.container{max-width:1400px;margin:0 auto;padding:0 20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:30px;padding:40px 0}
.card{background:#f5f5f5;border-radius:20px;overflow:hidden;cursor:pointer;transition:.2s;position:relative}
.card:hover{transform:scale(1.02)}
.card img{width:100%;height:220px;object-fit:cover;display:block}
.card-body{padding:20px}
.card h3{font-size:22px;font-weight:700;margin:0 0 8px}
.card p{font-size:15px;color:#666;line-height:1.5;margin:0}
.badge{position:absolute;top:15px;right:15px;background:#000;color:#fff;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:700}
#login{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
.login-box{text-align:center;width:100%;max-width:400px}
.login-box h1{font-size:48px;margin-bottom:30px}
.login-box input{padding:16px 24px;font-size:18px;border:2px solid #ddd;border-radius:12px;width:100%;margin-bottom:15px;display:block}
.login-box button{padding:16px 40px;font-size:18px;background:#000;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:600;width:100%}
.admin{position:fixed;top:20px;right:20px;background:#f5f5f5;padding:15px 20px;border-radius:50px;z-index:100;font-size:14px}
.admin button{background:#000;color:#fff;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;margin-left:10px;font-weight:600}
.game-view{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;z-index:9998;overflow:hidden}
.game-header{position:fixed;top:0;left:0;width:100%;height:60px;background:#000;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:9999}
.game-header h3{font-size:18px;margin:0}
.game-header button{background:#fff;color:#000;border:none;padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:700}
.game-iframe{width:100%;height:100%;border:none;margin-top:60px}
.craft-container{max-width:1200px;margin:80px auto 40px;padding:20px}
.craft-top{display:flex;justify-content:center;align-items:center;gap:15px;margin-bottom:40px;flex-wrap:wrap}
.craft-slot{background:#fff;border:2px solid #000;border-radius:12px;padding:12px 20px;font-size:18px;font-weight:600;cursor:pointer;min-width:120px;text-align:center}
.craft-slot.active{background:#000;color:#fff}
.craft-plus{font-size:24px;font-weight:700}
.craft-equals{font-size:24px;font-weight:700}
.craft-result{background:#fff;border:2px solid #000;border-radius:12px;padding:12px 20px;font-size:18px;font-weight:600;min-width:120px;min-height:48px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.elements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:30px}
.element{background:#fff;border:2px solid #000;border-radius:12px;padding:12px;text-align:center;cursor:pointer;font-weight:600;font-size:16px}
.element:hover{background:#f5f5f5;transform:translateY(-2px)}
.element-emoji{font-size:28px;display:block;margin-bottom:6px}
.admin-craft{background:#1a0033;color:#fff;padding:20px;border-radius:16px;margin:20px 0;border:2px solid #aa00ff}
.admin-craft h3{color:#aa00ff;margin-bottom:15px}
.admin-craft input{padding:10px;background:#000;border:1px solid #aa00ff;color:#fff;border-radius:8px;margin:5px;width:200px}
.admin-craft button{padding:10px 20px;background:#aa00ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin:5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:10000}
.modal-box{background:#fff;padding:40px;border-radius:20px;text-align:center;max-width:500px}
.modal-box h2{font-size:32px;margin-bottom:30px}
.modal-box button{display:block;width:100%;padding:20px;font-size:18px;background:#000;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:700;margin:10px 0}
.count{position:fixed;bottom:20px;left:20px;background:#000;color:#fff;padding:10px 20px;border-radius:50px;font-weight:700;z-index:100}
@media(prefers-color-scheme:dark){body{background:#000;color:#fff}.header p{color:#999}.card{background:#111}.card p{color:#999}.badge{background:#fff;color:#000}#login{background:#000}.login-box input{background:#111;border-color:#333;color:#fff}.login-box button{background:#fff;color:#000}.admin{background:#111}.admin button{background:#fff;color:#000}.game-view{background:#000}.game-header{background:#fff;color:#000}.game-header button{background:#000;color:#fff}.craft-slot{background:#111;border-color:#fff;color:#fff}.craft-slot.active{background:#fff;color:#000}.craft-result{background:#111;border-color:#fff}.element{background:#111;border-color:#fff;color:#fff}.element:hover{background:#222}.modal-box{background:#111;color:#fff}.modal-box button{background:#fff;color:#000}.count{background:#fff;color:#000}}
</style>
</head>
<body>
<div id="login">
<div class="login-box">
<h1>Biel.Fun</h1>
<input type="text" id="nomeInput" placeholder="Seu nome" maxlength="20">
<button onclick="entrar()">Entrar</button>
</div>
<div id="admin" class="admin hidden">👑 <span id="userName"></span> | <span id="userScore">0</span> pts<button onclick="sair()">Sair</button></div>
<div class="count hidden" id="countEl">0 elementos</div>
<div class="container" id="hub">
<div class="header"><h1>Biel.Fun</h1><p>Experimentos interativos</p></div>
<div class="grid" id="grid"></div>
</div>
<div id="modalEscolha" class="modal hidden">
<div class="modal-box">
<h2>Escolha a versão</h2>
<button onclick="abrirNealCraft()">Abrir Infinite Craft Neal</button>
<button onclick="abrirBebelCraft()">Abrir Infinite Craft BebelDev</button>
<button onclick="fecharModal()" style="background:#666">Cancelar</button>
</div>
<div id="gameView" class="game-view hidden">
<div class="game-header">
<h3 id="gameTitle">Carregando...</h3>
<button onclick="fechar()">✕ Fechar</button>
</div>
<div id="gameContent"></div>
</div>
<script>
let user=JSON.parse(localStorage.getItem('bielUser')||'{"nome":"","score":0,"admin":false}');
let elements=JSON.parse(localStorage.getItem('bielElements')||'[{"emoji":"💧","nome":"Água"},{"emoji":"🔥","nome":"Fogo"},{"emoji":"🌍","nome":"Terra"},{"emoji":"💨","nome":"Ar"}]');

let baseCombos={'Água+Fogo':'Vapor','Fogo+Água':'Vapor','Água+Terra':'Lama','Terra+Água':'Lama','Fogo+Terra':'Lava','Terra+Fogo':'Lava','Ar+Fogo':'Energia','Fogo+Ar':'Energia','Ar+Terra':'Poeira','Terra+Ar':'Poeira','Ar+Água':'Nuvem','Água+Ar':'Nuvem','Lava+Água':'Pedra','Água+Lava':'Pedra','Nuvem+Nuvem':'Chuva','Pedra+Fogo':'Metal','Fogo+Pedra':'Metal','Metal+Energia':'Robô','Energia+Metal':'Robô','Robô+Robô':'BielDev','Chuva+Terra':'Flor','Terra+Chuva':'Flor','Lama+Lama':'Porco','Porco+Porco':'Fazenda','Fazenda+Lama':'Galinha Pintadinha','Lama+Fazenda':'Galinha Pintadinha','Porco+Lama':'Sítio','Lama+Porco':'Sítio','Robô+Metal':'Exterminador','Metal+Robô':'Exterminador','BielDev+BielDev':'BebelDev','Energia+Água':'Raio','Água+Energia':'Raio','Raio+Nuvem':'Tempestade','Nuvem+Raio':'Tempestade','Tempestade+Robô':'Sharknado','Robô+Tempestade':'Sharknado','Sharknado+Sharknado':'Tornado','Tornado+Tornado':'Furacão','Fogo+Robô':'Gundam','Robô+Fogo':'Gundam','Gundam+Energia':'EVA','Energia+Gundam':'EVA','Metal+Metal':'Aço','Aço+Aço':'Titânio','Titânio+Fogo':'Espada','Fogo+Titânio':'Espada','Espada+Robô':'Mech','Robô+Espada':'Mech','Lava+Metal':'Vulcão','Metal+Lava':'Vulcão','Vulcão+Água':'Ilha','Água+Vulcão':'Ilha','Ilha+Ilha':'Continente','Continente+Continente':'Planeta','Planeta+Planeta':'Galáxia','Terra+Flor':'Brasil','Flor+Terra':'Brasil','Brasil+Fogo':'Churrasco','Fogo+Brasil':'Churrasco','Churrasco+Porco':'Costela','Porco+Churrasco':'Costela','Água+Brasil':'Coco','Brasil+Água':'Coco','Coco+Coco':'Coqueiro','Coqueiro+Ilha':'Praia','Ilha+Coqueiro':'Praia','Praia+Praia':'Litoral','Litoral+Brasil':'Rio de Janeiro','Fogo+Porco':'Bacon','Porco+Fogo':'Bacon','Bacon+Bacon':'X-Bacon','X-Bacon+Pão':'Hambúrguer','Pão+X-Bacon':'Hambúrguer','Hambúrguer+Brasil':'X-Tudo','Brasil+Hambúrguer':'X-Tudo','Água+Terra':'Barro','Terra+Água':'Barro','Barro+Fogo':'Tijolo','Fogo+Barro':'Tijolo','Tijolo+Tijolo':'Casa','Casa+Casa':'Cidade','Robô+Energia':'IA','Energia+Robô':'IA','IA+IA':'Skynet','Skynet+Robô':'Exterminador 2','Robô+Skynet':'Exterminador 2','Metal+Aço':'Carro','Aço+Metal':'Carro','Carro+Carro':'Engarrafamento','Engarrafamento+Brasil':'São Paulo','Brasil+Engarrafamento':'São Paulo','IA+Brasil':'BebelDev 2','Brasil+IA':'BebelDev 2','Planeta+Fogo':'Sol','Fogo+Planeta':'Sol','Sol+Sol':'Estrela','Estrela+Estrela':'Constelação','Constelação+Galáxia':'Universo','Galáxia+Constelação':'Universo','Universo+Universo':'Multiverso','Multiverso+Multiverso':'Omniverso','Água+Água':'Oceano','Oceano+Oceano':'Mar','Mar+Mar':'Atlântico','Fogo+Fogo':'Inferno','Inferno+Inferno':'Diabo','Terra+Terra':'Montanha','Montanha+Montanha':'Cordilheira','Ar+Ar':'Vento','Vento+Vento':'Ciclone','Pedra+Pedra':'Rocha','Rocha+Rocha':'Montanha 2'};

let baseEmoji={'Vapor':'💨','Lama':'💩','Lava':'🌋','Energia':'⚡','Poeira':'🌪️','Nuvem':'☁️','Pedra':'🪨','Chuva':'🌧️','Metal':'⚙️','Robô':'🤖','BielDev':'👑','Flor':'🌸','Porco':'🐷','Fazenda':'🚜','Galinha Pintadinha':'🐔','Sítio':'🏡','Exterminador':'🦾','BebelDev':'👑','Raio':'⚡','Tempestade':'🌩️','Sharknado':'🦈','Tornado':'🌪️','Furacão':'🌀','Gundam':'🤖','EVA':'🤖','Aço':'🔩','Titânio':'🛡️','Espada':'⚔️','Mech':'🦾','Vulcão':'🌋','Ilha':'🏝️','Continente':'🌍','Planeta':'🪐','Galáxia':'🌌','Brasil':'🇧🇷','Churrasco':'🥩','Costela':'🍖','Coco':'🥥','Coqueiro':'🌴','Praia':'🏖️','Litoral':'🌊','Rio de Janeiro':'🏙️','Bacon':'🥓','X-Bacon':'🍔','Hambúrguer':'🍔','X-Tudo':'🍔','Barro':'🪨','Tijolo':'🧱','Casa':'🏠','Cidade':'🏙️','IA':'🤖','Skynet':'🤖','Exterminador 2':'🦾','Carro':'🚗','Engarrafamento':'🚦','São Paulo':'🏙️','BebelDev 2':'👑','Sol':'☀️','Estrela':'⭐','Constelação':'✨','Universo':'🌌','Multiverso':'🌀','Omniverso':'💫','Oceano':'🌊','Mar':'🌊','Atlântico':'🌊','Inferno':'🔥','Diabo':'😈','Montanha':'⛰️','Cordilheira':'🏔️','Vento':'💨','Ciclone':'🌀','Rocha':'🪨','Montanha 2':'⛰️'};

let selectedSlot=0,slots=[null,null];

// SÓ OS 4 QUE LIBERAM IFRAME = true. RESTO = false
const jogos=[
{n:"Infinite Craft",d:"Combine elementos pra criar tudo que existe",i:"https://images.unsplash.com/photo-1611224923853-80b023f02d71?w=800&h=600&fit=crop",u:"craft",iframe:false},
{n:"Draw a Perfect Circle",d:"Consegue desenhar um círculo perfeito?",i:"https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800&h=600&fit=crop",u:"https://neal.fun/perfect-circle/",iframe:true},
{n:"Spend Bill Gates' Money",d:"Gaste 100 bilhões de dólares",i:"https://images.unsplash.com/photo-1559526324-4b87b5e36e44?w=800&h=600&fit=crop",u:"https://neal.fun/spend/",iframe:true},
{n:"Life Stats",d:"Estatísticas da tua vida",i:"https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=800&h=600&fit=crop",u:"https://neal.fun/life-stats/",iframe:true},
{n:"Who Was Alive?",d:"Quem tava vivo quando tu nasceu?",i:"https://images.unsplash.com/photo-1531384441138-2736e62e0919?w=800&h=600&fit=crop",u:"https://neal.fun/who-was-alive/",iframe:true},
{n:"The Auction Game",d:"Dê lances em pinturas malucas",i:"https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?w=800&h=600&fit=crop",u:"https://neal.fun/auction-game/",iframe:false},
{n:"Asteroid Launcher",d:"Lance asteroides na Terra",i:"https://images.unsplash.com/photo-1419242902214-272b3f66ee7a?w=800&h=600&fit=crop",u:"https://neal.fun/asteroid-launcher/",iframe:false},
{n:"The Password Game",d:"Crie uma senha impossível",i:"https://images.unsplash.com/photo-1614064641938-3bbee52942c5?w=800&h=600&fit=crop",u:"https://neal.fun/password-game/",iframe:false}
];

document.getElementById('nomeInput').addEventListener('keypress',function(e){if(e.key==='Enter')entrar();});

function init(){if(user.nome){document.getElementById('login').classList.add('hidden');document.getElementById('admin').classList.remove('hidden');document.getElementById('countEl').classList.remove('hidden');document.getElementById('userName').textContent=user.nome;document.getElementById('userScore').textContent=user.score;updateCount()}renderGrid()}
function updateCount(){document.getElementById('countEl').textContent=elements.length+' elementos'}
function renderGrid(){document.getElementById('grid').innerHTML=jogos.map(j=>`<div class="card" onclick="abrir('${j.u}','${j.n}',${j.iframe})"><div class="badge">${j.iframe?'Iframe':'Nova aba'}</div><img src="${j.i}" alt="${j.n}"><div class="card-body"><h3>${j.n}</h3><p>${j.d}</p></div></div>`).join('')}
function entrar(){let nome=document.getElementById('nomeInput').value.trim();if(!nome){alert('Digita um nome!');return}user={nome:nome,score:0,admin:nome==='BebelDev👑'};localStorage.setItem('bielUser',JSON.stringify(user));document.getElementById('login').classList.add('hidden');document.getElementById('admin').classList.remove('hidden');document.getElementById('countEl').classList.remove('hidden');document.getElementById('userName').textContent=user.nome;document.getElementById('userScore').textContent=user.score;updateCount();renderGrid()}
function sair(){localStorage.removeItem('bielUser');location.reload()}

function abrir(url,nome,useIframe){
addPonto();
if(url==='craft'){
if(user.admin){document.getElementById('modalEscolha').classList.remove('hidden')}
else{window.open('https://neal.fun/infinite-craft/','_blank')}
}else if(useIframe){
document.getElementById('gameView').classList.remove('hidden');
document.getElementById('gameTitle').textContent=nome;
document.getElementById('gameContent').innerHTML=`<iframe src="${url}" class="game-iframe" allow="fullscreen"></iframe>`;
}else{
window.open(url,'_blank');
}
}

function abrirNealCraft(){window.open('https://neal.fun/infinite-craft/','_blank');fecharModal();addPonto()}
function abrirBebelCraft(){document.getElementById('gameView').classList.remove('hidden');document.getElementById('gameTitle').textContent='Infinite Craft BebelDev';fecharModal();renderCraft();addPonto()}
function fecharModal(){document.getElementById('modalEscolha').classList.add('hidden')}
function addPonto(){user.score+=10;localStorage.setItem('bielUser',JSON.stringify(user));document.getElementById('userScore').textContent=user.score}
function getUniqueName(nome){if(!elements.find(e=>e.nome===nome))return nome;let i=2;while(elements.find(e=>e.nome===`${nome} ${i}`))i++;return `${nome} ${i}`;}
function renderCraft(){let adminPanel=user.admin?`<div class="admin-craft"><h3>👑 PAINEL ADMIN BIEL CRAFT</h3><p>Cria qualquer elemento sem precisar dos 2 itens:</p><input type="text" id="adminCraftName" placeholder="Ex: Diamante"><button onclick="adminCraft()">Criar Elemento</button><button onclick="desbloquearTudo()">Desbloquear Tudo</button><button onclick="resetarElementos()">Resetar Elementos</button></div>`:'';document.getElementById('gameContent').innerHTML=`<div class="craft-container">${adminPanel}<div class="craft-top"><div class="craft-slot ${selectedSlot===0?'active':''}" onclick="selectSlot(0)">${slots[0]?`<div class="element-emoji">${slots[0].emoji}</div>${slots[0].nome}`:'?'}</div><div class="craft-plus">+</div><div class="craft-slot ${selectedSlot===1?'active':''}" onclick="selectSlot(1)">${slots[1]?`<div class="element-emoji">${slots[1].emoji}</div>${slots[1].nome}`:'?'}</div><div class="craft-equals">=</div><div class="craft-result" id="result"></div></div><div class="elements-grid">${elements.map(e=>`<div class="element" onclick='addElement(${JSON.stringify(e)})'><div class="element-emoji">${e.emoji}</div>${e.nome}</div>`).join('')}</div></div>`;updateCount();}
function selectSlot(i){selectedSlot=i;renderCraft()}
function addElement(e){slots[selectedSlot]=e;renderCraft()}
function limpar(){slots=[null,null];document.getElementById('result').innerHTML='';renderCraft()}
function combinar(){if(!slots[0]||!slots[1])return;let key=slots[0].nome+'+'+slots[1].nome;let result=baseCombos[key];if(result){let uniqueName=getUniqueName(result);let emoji=baseEmoji[result]||'✨';document.getElementById('result').innerHTML=`<div class="element-emoji">${emoji}</div>${uniqueName}`;if(!elements.find(e=>e.nome===uniqueName)){elements.push({emoji:emoji,nome:uniqueName});localStorage.setItem('bielElements',JSON.stringify(elements));user.score+=50;localStorage.setItem('bielUser',JSON.stringify(user));document.getElementById('userScore').textContent=user.score;}setTimeout(()=>{limpar();renderCraft()},1200);}else{document.getElementById('result').innerHTML='Nada';}}
function adminCraft(){let nome=document.getElementById('adminCraftName').value.trim();if(!nome)return;let uniqueName=getUniqueName(nome);if(!elements.find(e=>e.nome===uniqueName)){elements.push({emoji:'✨',nome:uniqueName});localStorage.setItem('bielElements',JSON.stringify(elements));alert('Elemento '+uniqueName+' criado!');renderCraft();}}
function desbloquearTudo(){Object.values(baseCombos).forEach(v=>{let uniqueName=getUniqueName(v);if(!elements.find(e=>e.nome===uniqueName)){elements.push({emoji:baseEmoji[v]||'✨',nome:uniqueName});}});localStorage.setItem('bielElements',JSON.stringify(elements));alert('Todos elementos desbloqueados!');renderCraft();}
function resetarElementos(){if(confirm('Tem certeza? Vai apagar tudo menos os 4 básicos!')){elements=[{emoji:'💧',nome:'Água'},{emoji:'🔥',nome:'Fogo'},{emoji:'🌍',nome:'Terra'},{emoji:'💨',nome:'Ar'}];localStorage.setItem('bielElements',JSON.stringify(elements));renderCraft();}}
function fechar(){document.getElementById('gameView').classList.add('hidden');document.getElementById('gameContent').innerHTML='';slots=[null,null]}
init();
</script>
</body>
</html>
