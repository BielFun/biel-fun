<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biel Fun 👑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d0d;color:#fff;font-family:system-ui,-apple-system,sans-serif;padding:20px}
.hidden{display:none!important}
h1{font-size:3em;margin:30px 0;text-align:center;font-weight:800;letter-spacing:-2px}
.subtitle{color:#888;text-align:center;margin-bottom:40px;font-size:1.1em}
.container{max-width:1200px;margin:0 auto}
#login{text-align:center;padding:100px 20px}
#login input{padding:15px 20px;font-size:18px;background:#1a1a1a;border:2px solid #333;color:#fff;border-radius:12px;margin:20px;width:300px;max-width:90%}
#login button{padding:15px 40px;font-size:18px;background:#fff;color:#000;border:none;border-radius:12px;cursor:pointer;font-weight:700;transition:.2s}
#login button:hover{transform:scale(1.05)}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;padding:20px 0}
.game-card{background:#1a1a1a;border-radius:16px;overflow:hidden;cursor:pointer;transition:.3s;border:1px solid #222}
.game-card:hover{transform:translateY(-8px);border-color:#444;box-shadow:0 10px 40px rgba(255,255,255,0.1)}
.game-card img{width:100%;height:200px;object-fit:cover;background:#222}
.game-card-content{padding:16px}
.game-card h3{font-size:1.3em;margin-bottom:8px}
.game-card p{color:#888;font-size:.9em;line-height:1.4}
.tag{display:inline-block;background:#333;color:#aaa;padding:4px 10px;border-radius:6px;font-size:.75em;margin-top:10px;margin-right:6px}
.admin-panel{background:#1a0033;border:2px solid #aa00ff;padding:20px;border-radius:16px;margin:30px 0;text-align:center}
.admin-panel h3{color:#aa00ff;margin-bottom:15px}
.admin-panel input{padding:10px;background:#111;border:1px solid #aa00ff;color:#fff;border-radius:8px;margin:5px}
.admin-panel button{padding:10px 20px;background:#aa00ff;color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:700;margin:5px}
#userBar{position:fixed;top:20px;right:20px;background:#1a1a1a;padding:12px 20px;border-radius:50px;border:1px solid #333;z-index:100}
#userBar button{background:#333;color:#fff;border:none;padding:6px 12px;border-radius:20px;cursor:pointer;margin-left:10px}
.game-frame{position:fixed;top:0;left:0;width:100%;height:100%;background:#0d0d0d;z-index:999}
.game-frame iframe{width:100%;height:100%;border:none}
.close-game{position:fixed;top:20px;right:20px;z-index:1000;background:#fff;color:#000;border:none;padding:12px 24px;border-radius:50px;font-weight:700;cursor:pointer;font-size:16px}
</style>
</head>
<body>
<div id="userBar" class="hidden">👤 <span id="userName"></span> | 🏆 <span id="userScore">0</span> <button onclick="sair()">Sair</button></div>
<div class="container">
<div id="login">
<h1>Biel Fun 👑</h1>
<p class="subtitle">Experimentos e jogos pra passar o tempo</p>
<input type="text" id="nomeInput" placeholder="Digite seu nome" maxlength="20">
<br><button onclick="entrar()">ENTRAR</button>
</div>
<div id="menu" class="hidden">
<h1>Biel Fun 👑</h1>
<p class="subtitle">Clique em qualquer experimento pra começar</p>
<div class="games-grid" id="gamesGrid"></div>
<div id="adminPanel" class="admin-panel hidden">
<h3>👑 PAINEL ADMIN</h3>
<input type="number" id="addScore" placeholder="Pontos">
<button onclick="addPontos()">Add Pontos</button>
<button onclick="zerarPontos()">Zerar</button>
<button onclick="verRanking()">Ranking</button>
</div>
</div>
</div>
<div id="gameFrame" class="game-frame hidden">
<button class="close-game" onclick="fecharJogo()">✕ FECHAR</button>
<iframe id="gameIframe" src=""></iframe>
</div>
<script>
let user = { nome: '', score: 0, isAdmin: false };

// JOGOS INSPIRADOS NO NEAL.FUN - com links pros originais
const games = [
{
nome: 'Draw a Perfect Circle',
desc: 'Consegue desenhar um círculo perfeito? Teste sua precisão.',
img: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&h=400&fit=crop',
url: 'https://neal.fun/perfect-circle/',
tag: 'Precisão'
},
{
nome: 'Spend Bill Gates Money',
desc: 'Gaste toda a fortuna do Bill Gates. O que você compraria?',
img: 'https://images.unsplash.com/photo-1526304640581-d334cdbbf45e?w=600&h=400&fit=crop',
url: 'https://neal.fun/spend/',
tag: 'Simulação'
},
{
nome: 'Asteroid Launcher',
desc: 'Lance um asteroide na Terra e veja a destruição.',
img: 'https://images.unsplash.com/photo-1446776877081-d282a0f896e2?w=600&h=400&fit=crop',
url: 'https://neal.fun/asteroid-launcher/',
tag: 'Espaço'
},
{
nome: 'The Password Game',
desc: 'Crie uma senha seguindo regras cada vez mais absurdas.',
img: 'https://images.unsplash.com/photo-1555421689-3f034debb7a6?w=600&h=400&fit=crop',
url: 'https://neal.fun/password-game/',
tag: 'Puzzle'
},
{
nome: 'Absurd Trolley Problems',
desc: 'Problemas morais do bonde desgovernado em versão absurda.',
img: 'https://images.unsplash.com/photo-1569173112611-52a7b2aa31f8?w=600&h=400&fit=crop',
url: 'https://neal.fun/absurd-trolley-problems/',
tag: 'Filosofia'
},
{
nome: 'Life Stats',
desc: 'Veja estatísticas da sua vida em tempo real.',
img: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=400&fit=crop',
url: 'https://neal.fun/life-stats/',
tag: 'Dados'
},
{
nome: 'Size of Space',
desc: 'Explore o tamanho do universo rolando pra baixo.',
img: 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=600&h=400&fit=crop',
url: 'https://neal.fun/size-of-space/',
tag: 'Espaço'
},
{
nome: 'Internet Artifacts',
desc: 'Navegue por artefatos antigos da internet.',
img: 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600&h=400&fit=crop',
url: 'https://neal.fun/internet-artifacts/',
tag: 'História'
}
];

window.onload = () => {
let saved = localStorage.getItem('bielUser');
if (saved) { user = JSON.parse(saved); mostrarMenu(); }
renderGames();
};

function renderGames() {
const grid = document.getElementById('gamesGrid');
grid.innerHTML = games.map(g => `
<div class="game-card" onclick="abrirJogo('${g.url}')">
<img src="${g.img}" alt="${g.nome}">
<div class="game-card-content">
<h3>${g.nome}</h3>
<p>${g.desc}</p>
<span class="tag">${g.tag}</span>
</div>
</div>
`).join('');
}

function entrar() {
let nome = document.getElementById('nomeInput').value.trim();
if (!nome) return alert('Digita um nome!');
user.nome = nome;
user.isAdmin = nome === 'BebelDev👑';
salvarUser(); mostrarMenu();
}

function mostrarMenu() {
document.getElementById('login').classList.add('hidden');
document.getElementById('menu').classList.remove('hidden');
document.getElementById('userBar').classList.remove('hidden');
document.getElementById('userName').textContent = user.nome;
document.getElementById('userScore').textContent = user.score;
if (user.isAdmin) document.getElementById('adminPanel').classList.remove('hidden');
}

function sair() {
localStorage.removeItem('bielUser');
location.reload();
}

function salvarUser() {
localStorage.setItem('bielUser', JSON.stringify(user));
document.getElementById('userScore').textContent = user.score;
}

function addPontos() {
let pts = parseInt(document.getElementById('addScore').value) || 0;
user.score += pts; salvarUser(); alert(`+${pts} pontos!`);
}

function zerarPontos() { user.score = 0; salvarUser(); alert('Zerado!'); }

function verRanking() {
let rank = JSON.parse(localStorage.getItem('bielRanking') || '[]');
rank.push({nome: user.nome, score: user.score});
rank.sort((a,b) => b.score - a.score);
localStorage.setItem('bielRanking', JSON.stringify(rank.slice(0,10)));
alert('🏆 TOP 10:\n\n' + rank.slice(0,10).map((r,i) => `${i+1}. ${r.nome} - ${r.score}pts`).join('\n'));
}

function abrirJogo(url) {
user.score += 5; salvarUser(); // Ganha 5 pontos por jogar
document.getElementById('gameFrame').classList.remove('hidden');
document.getElementById('gameIframe').src = url;
}

function fecharJogo() {
document.getElementById('gameFrame').classList.add('hidden');
document.getElementById('gameIframe').src = '';
}
</script>
</body>
</html>
